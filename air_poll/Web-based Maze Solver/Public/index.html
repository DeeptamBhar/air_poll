<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Based Maze Solver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Maze Solver Control Panel</h1>
    <div class="controls">
        <label>Tool:</label>
        <select id="tool-select">
            <option value="wall">Wall</option>
            <option value="start">Start Point</option>
            <option value="end">End Point</option>
        </select>
        <button id="solve-button">Solve and Run Robot</button>
        <button id="reset-button">Reset Grid</button>
    </div>
    <div id="grid-container"></div>
    <p id="status-text">Draw your maze and set start/end points.</p>

    <script src="app.js"></script>
</body>
</html>
